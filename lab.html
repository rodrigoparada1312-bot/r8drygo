<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>r8drygo — lab</title>
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="rodrigo parada — photographer + director">
<link rel="icon" type="image/png" href="img/logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--fg:#111111;--line:#e6e6e6;
  --side:260px;--gap:10px;
}
html,body{background:var(--bg);color:var(--fg);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:13px;line-height:1.45}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
body{display:flex;min-height:100vh}

/* ---------- SIDEBAR ---------- */
#side{position:fixed;top:0;left:0;width:var(--side);height:100vh;
  padding:26px 22px 22px;display:flex;flex-direction:column;
  border-right:1px solid var(--line);background:var(--bg);z-index:40}
#brand{display:flex;flex-direction:column;gap:12px;flex:0 0 auto}
#brand img{width:158px;height:auto}
.tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg)}
#views{margin-top:24px;display:flex;flex-direction:column;gap:4px;flex:0 0 auto}
.vbtn{font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--fg);cursor:pointer;background:none;border:0;text-align:left;
  padding:2px 0;font-family:inherit;transition:opacity .15s;opacity:.55}
.vbtn:hover{opacity:1}
.vbtn.act{opacity:1;text-decoration:underline;text-underline-offset:3px}
.filters{margin-top:16px;display:flex;flex-direction:column;gap:3px;flex:0 0 auto}
.fbtn{font-size:11px;letter-spacing:.05em;color:var(--fg);cursor:pointer;
  background:none;border:0;text-align:left;padding:1px 0;font-family:inherit;
  text-transform:lowercase;transition:opacity .15s;opacity:.55}
.fbtn:hover{opacity:1}
.fbtn.act{opacity:1;text-decoration:underline;text-underline-offset:3px}
#idxwrap{margin-top:18px;flex:1 1 auto;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin}
#idxwrap::-webkit-scrollbar{width:5px}
#idxwrap::-webkit-scrollbar-thumb{background:var(--line)}
.ixItem{display:block;font-size:11.5px;line-height:1.55;color:var(--fg);
  cursor:pointer;text-transform:lowercase;padding:1px 0;transition:opacity .12s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.62}
.ixItem:hover,.ixItem.hot{opacity:1}
#contact{flex:0 0 auto;padding-top:16px;margin-top:12px;border-top:1px solid var(--line);
  display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--fg)}
#contact a{opacity:.62;transition:opacity .15s}
#contact a:hover{opacity:1}

/* ---------- MAIN ---------- */
#main{margin-left:var(--side);flex:1 1 auto;padding:26px 22px 60px;min-width:0}
#topbar{display:flex;gap:20px;margin:0 0 18px;justify-content:flex-end}
#stage{display:flex;gap:var(--gap);align-items:flex-start}
.gcol{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:var(--gap)}
.cell{cursor:pointer;position:relative;background:#f4f4f4}
.cell img{width:100%;height:auto}
.cell .cap{position:absolute;left:0;right:0;bottom:0;padding:8px 8px 7px;
  font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#fff;
  background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,0));
  opacity:0;transition:opacity .18s}
.cell:hover .cap{opacity:1}
.cell.vid::after{content:"";position:absolute;top:50%;left:50%;
  width:0;height:0;transform:translate(-40%,-50%);
  border-left:16px solid rgba(255,255,255,.92);
  border-top:11px solid transparent;border-bottom:11px solid transparent;
  filter:drop-shadow(0 0 4px rgba(0,0,0,.4));pointer-events:none;opacity:.9}
.cell.vid .cap{opacity:1;background:linear-gradient(to top,rgba(0,0,0,.6),rgba(0,0,0,0))}
#empty{color:#999;font-size:12px;padding:40px 4px}

/* ---------- ABOUT ---------- */
#about{display:none;max-width:900px;padding:6px 4px}
#about.on{display:flex;gap:34px;flex-wrap:wrap;align-items:flex-start}
#about img{width:340px;max-width:100%;height:auto;background:#f4f4f4}
.about-txt{font-size:14px;line-height:1.7;max-width:340px}
.about-txt .sep{height:18px}
.about-txt a{text-decoration:underline;text-underline-offset:2px}

/* ---------- MODAL (project lightbox) ---------- */
#modal{position:fixed;inset:0;background:rgba(255,255,255,.985);z-index:80;
  display:none;flex-direction:column}
#modal.open{display:flex}
#mtop{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--fg)}
#mcount{opacity:.5}
#mclose{cursor:pointer;font-size:20px;line-height:1;color:var(--fg);background:none;border:0;padding:0 4px}
#mstage{flex:1 1 auto;position:relative;display:flex;align-items:center;justify-content:center;
  padding:0 20px 20px;min-height:0}
#mimg{max-width:100%;max-height:100%;object-fit:contain}
.marrow{position:absolute;top:0;bottom:0;width:34%;cursor:pointer;background:none;border:0;
  display:flex;align-items:center;z-index:2}
#mprev{left:0;justify-content:flex-start;padding-left:14px}
#mnext{right:0;justify-content:flex-end;padding-right:14px}
.marrow span{font-size:26px;color:var(--fg);opacity:0;transition:opacity .15s}
.marrow:hover span{opacity:.6}

/* ---------- VIDEO MODAL ---------- */
#vmodal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:90;display:none;
  flex-direction:column}
#vmodal.open{display:flex}
#vtop{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:#fff}
#vclose{cursor:pointer;font-size:20px;line-height:1;color:#fff;background:none;border:0}
#vframe{flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:0 20px 24px}
#vframe .box{position:relative;width:100%;max-width:1100px}
#vframe iframe{width:100%;height:100%;border:0;background:#000}

/* ---------- RESPONSIVE ---------- */
@media(max-width:820px){
  body{flex-direction:column}
  #side{position:sticky;top:0;width:100%;height:auto;flex-direction:row;flex-wrap:wrap;
    align-items:center;gap:14px;padding:12px 16px;border-right:0;border-bottom:1px solid var(--line)}
  #brand{flex-direction:row;align-items:center;gap:12px}
  #brand img{width:96px}
  .tag{font-size:10px}
  #views{flex-direction:row;margin-top:0;gap:14px}
  .filters{flex-direction:row;margin-top:0;gap:12px;margin-left:auto}
  #idxwrap{display:none}
  #contact{flex-direction:row;gap:14px;border-top:0;padding-top:0;margin-top:0;width:100%;
    font-size:10.5px}
  #main{margin-left:0;padding:16px}
  #about.on{gap:20px}
  #about img{width:100%}
}
</style>
</head>

      <div class="sep"></div>
      clientes: Adidas, MUBI, Ripley, Vogue Mexico, ABC, Bold, The Line, CMiller, De Goya
      <div class="sep"></div>
      <a href="mailto:rodri@r8drygo.com">rodri@r8drygo.com</a><br>

    </div>

<!-- PROJECT LIGHTBOX -->
<div id="modal">
  <div id="mtop">
    <span id="mtitle"></span>
    <span style="display:flex;gap:16px;align-items:center">
      <span id="mcount"></span>
      <button id="mclose" onclick="closeM()">×</button>
    </span>
  </div>
  <div id="mstage">
    <button id="mprev" class="marrow" onclick="nav(-1)"><span>‹</span></button>
    <img id="mimg" alt="">

  </div>
</div>

<!-- VIDEO LIGHTBOX -->
<div id="vmodal">
  <div id="vtop">
    <span id="vtitle"></span>
    <button id="vclose" onclick="closeV()">×</button>
  </div>
  <div id="vframe"><div class="box" id="vbox"></div></div>
</div>

<script>
/* ====== CLIPS (showcase vimeo.com/showcase/12312201) ======
   home:true  -> aparece intercalado en el landing (index)
   ho         -> orden en el landing
   Todos aparecen en la pestaña "video".                        */
var VC="https://i.vimeocdn.com/video/";
var CLIPS=[
 {id:"1206581237",t:"abc sastreros",o:"H",home:true,ho:1,th:VC+"2175462945-cda52b456cb2fb728ad9428368987a2a981b73603b7441f327b31a948d0a3c5d-d_640"},
 {id:"1206578041",t:"trial nueva colección",o:"H",home:true,ho:6,th:VC+"2175459565-f8d46d0f4b8851612826968fa4f345241bff465b1d2052a65737972bbd610859-d_640"},
 {id:"1206568953",t:"massima rita abrigos",o:"V",home:true,ho:2,th:VC+"2175446513-aed47bd37151c7dd16a3549d1844bc98b3c1cf3eb439d83f7938dc467e7905f8-d_640"},
 {id:"1206577236",t:"trial graduación",o:"H",home:true,ho:7,th:VC+"2175457737-4c708e724463242c533945f163a4b680ce952cc5fd8dc890ea8d82e6ee636125-d_640"},
 {id:"1206580359",t:"trial zapatos",o:"H",home:true,ho:3,th:VC+"2175461798-b3e623c5becfdc06027e8728af8f64ed8f78807de4f5c9b799251ed0ebce61e7-d_640"},
 {id:"1206569734",t:"massima rita trench",o:"V",home:true,ho:4,th:VC+"2175447491-0fb54b1cac4afb47dd93bbce7598756ae4ccf37e77cafdce7838fe422bf4532b-d_640"},
 {id:"1206570086",t:"ripley girl gang x samsung",o:"V",home:true,ho:8,th:VC+"2175447999-e94ed19b948e34df98aaf1cd80d0bd21c46c15ec9d83f590e583a8320de70a78-d_640"},
 {id:"1206570560",t:"ripley marquis 2",o:"V",home:true,ho:9,th:VC+"2175448741-64a929cb25581b1ae8be024a1043aa9e34dc8a0ae6b8947a3bff45d87b5cd1f8-d_640"},
 {id:"1206572400",t:"ripley sneakerhead",o:"V",home:true,ho:10,th:VC+"2175451231-a28b77353d43b86d65aec738e309335a9cc35ce875ea326363292aac6c3ef458-d_640"},
 {id:"1206572682",t:"ripley verano 2",o:"V",home:true,ho:11,th:VC+"2175451548-6ba40789e8688a88d58e6be3d40534c1510b743f3d25bb593e788d30e4d71166-d_640"},
 {id:"1206513495",t:"c miller summer 2023",o:"V",home:true,ho:12,th:VC+"2175375490-cc270e107928f98887381d1f386bafd28441ad7f2c219e91488a7d4563001709-d_640"},
 {id:"1206566197",t:"c miller summer 2024",o:"V",home:true,ho:5,th:VC+"2175443013-0be26d1ce9b79412dac40c085e65730225ae4aa033d694652a812d367dbd0da2-d_640"},
 {id:"1206566742",t:"degoya cctv",o:"V",home:true,ho:13,th:VC+"2175443722-07251448f1d0191f9e5907440d1a5bf8d1bd7dc383cb941d3b5b72591427537a-d_640"},
 {id:"1206567106",t:"degoya winter 2024",o:"H",home:true,ho:14,th:VC+"2175444163-e01c938b6412737c801a176502155e20ebdfc5e09583335d59b9ae17c12cd140-d_640"},
 {id:"1206576355",t:"trial alto verano",o:"H",home:true,ho:15,th:VC+"2175456451-22c402e931f54e43887a881b17dca489fd0931766934c939146e7dd8976cfbb2-d_640"},
 {id:"1206567763",t:"jack & jones ddp 3",o:"H",home:true,ho:16,th:VC+"2175445044-d6f053e3df47fec9e81e4792037204b5182b65135d9d7eef134407e02a9cdd22-d_640"},
 {id:"1206581203",t:"abc verano 2025",o:"H",home:true,ho:17,th:VC+"2175462918-4e61c125d6aa11860c352bcdf1de45ca9077f354349b988cd8fa54ab8992c55b-d_640"}
];
function homeClips(){return CLIPS.filter(function(c){return c.home;}).sort(function(a,b){return a.ho-b.ho;});}

/* ====== STATE ====== */
var P=[],S={},aF="ALL",VIEW="index";
var cP=0,cI=0;

/* ====== DATA: leer proyectos desde / (index.html en vivo) ====== */
function full(pair){return "img/"+pair.split(":")[0]+".jpg";}
function small(pair){var u=pair.split(":")[0];return S[u]?"img/"+u+"_600.jpg":"img/"+u+".jpg";}
function cover(p){
  if(p.cov){var u=p.cov.split(":")[0];return S[u]?"img/"+u+"_600.jpg":"img/"+u+".jpg";}
  return small(p.imgs[0]);
}

async function load(){
  try{
    var r=await fetch("/",{cache:"no-store"});
    var t=await r.text();
    var mp=t.match(/var\s+P\s*=\s*(\[[\s\S]*?\])\s*;/);
    var ms=t.match(/var\s+S\s*=\s*(\{[\s\S]*?\})\s*;/);
    if(!mp) throw new Error("no P");
    P=JSON.parse(mp[1]).filter(function(p){return p.imgs&&p.imgs.length;});
    S=ms?JSON.parse(ms[1]):{};
    document.getElementById("empty").style.display="none";
    buildIndex();render();
  }catch(e){
    document.getElementById("empty").style.display="block";
    document.getElementById("empty").textContent="no se pudieron cargar los proyectos.";
  }
}

/* ====== SIDEBAR INDEX ====== */
function buildIndex(){
  var ix=document.getElementById("index");ix.innerHTML="";
  P.forEach(function(p,i){
    var a=document.createElement("div");
    a.className="ixItem";a.textContent=p.t;a.dataset.pi=i;
    a.onclick=function(){openM(i);};
    ix.appendChild(a);
  });
}

/* ====== MAIN GRID (columnas round-robin, mismo orden que el index) ====== */
function colCount(){return window.innerWidth<=820?2:(window.innerWidth<=1200?4:5);}

function render(){
  var main=document.getElementById("main");
  var stage=document.getElementById("stage");
  var about=document.getElementById("about");
  // about view
  if(VIEW==="about"){stage.style.display="none";about.classList.add("on");return;}
  about.classList.remove("on");stage.style.display="flex";stage.innerHTML="";

  var items=[];
  if(VIEW==="video"){
    CLIPS.forEach(function(c){items.push({type:"clip",clip:c});});
  }else{
    P.forEach(function(p,pi){
      if(aF!=="ALL"&&p.cat!==aF)return;
      items.push({type:"photo",pi:pi});
    });
    // intercalar SOLO los clips marcados home (en su orden), solo en vista ALL
    if(aF==="ALL"){
      var hc=homeClips();
      if(hc.length){
        var total=items.length+hc.length;
        for(var k=0;k<hc.length;k++){
          var pos=Math.round((k+1)*total/(hc.length+1));
          if(pos>items.length)pos=items.length;
          items.splice(pos,0,{type:"clip",clip:hc[k]});
        }
      }
    }
  }
  if(!items.length){stage.innerHTML='<div id="empty">sin resultados.</div>';return;}

  var n=colCount();
  var cols=[];
  for(var c=0;c<n;c++){var col=document.createElement("div");col.className="gcol";cols.push(col);stage.appendChild(col);}
  items.forEach(function(it,i){
    var cell=(it.type==="photo")?photoCell(P[it.pi],it.pi):clipCell(it.clip);
    cols[i%n].appendChild(cell);
  });
}
function photoCell(p,pi){
  var d=document.createElement("div");d.className="cell";
  var im=document.createElement("img");im.loading="lazy";im.src=cover(p);im.alt=p.t;
  var cap=document.createElement("div");cap.className="cap";cap.textContent=p.t;
  d.appendChild(im);d.appendChild(cap);
  d.onclick=function(){openM(pi);};
  return d;
}
function clipCell(c){
  var d=document.createElement("div");d.className="cell vid";
  var im=document.createElement("img");im.loading="lazy";im.alt=c.t;
  im.src=c.th;
  im.onerror=function(){this.onerror=null;this.src="https://vumbnail.com/"+c.id+".jpg";};
  var cap=document.createElement("div");cap.className="cap";cap.textContent=c.t;
  d.appendChild(im);d.appendChild(cap);
  d.onclick=function(){openV(c);};
  return d;
}

/* ====== VIEW / FILTER ====== */
function setView(v){
  VIEW=v;
  document.querySelectorAll(".vbtn").forEach(function(b){b.classList.toggle("act",b.dataset.view===v);});
  document.getElementById("filters").style.display=(v==="about")?"none":"flex";
  if(v==="index")document.querySelectorAll(".fbtn").forEach(function(b){b.classList.toggle("act",b.dataset.cat===aF);});
  window.scrollTo(0,0);render();
}
function setCat(c,btn){
  aF=c;
  document.querySelectorAll(".fbtn").forEach(function(b){b.classList.remove("act");});
  btn.classList.add("act");
  if(VIEW!=="index")setView("index");else render();
}

/* ====== PROJECT MODAL ====== */
function openM(pi){
  cP=pi;cI=0;
  document.getElementById("modal").classList.add("open");
  document.addEventListener("keydown",onKey);
  P[pi].imgs.slice(0,3).forEach(function(x){var i=new Image();i.src=full(x);});
  showImg();
}
function showImg(){
  var p=P[cP],imgs=p.imgs;
  var el=document.getElementById("mimg");
  var sm=small(imgs[cI]),fu=full(imgs[cI]);
  if(sm!==fu){el.src=sm;var b=new Image();(function(pp,ii){b.onload=function(){if(cP===pp&&cI===ii)el.src=fu;};})(cP,cI);b.src=fu;}
  else el.src=fu;
  var nx=imgs[(cI+1)%imgs.length];(new Image()).src=full(nx);
  document.getElementById("mtitle").textContent=p.t;
  document.getElementById("mcount").textContent=(cI+1)+" / "+imgs.length;
  var show=imgs.length>1?"flex":"none";
  document.getElementById("mprev").style.display=show;
  document.getElementById("mnext").style.display=show;
}
function nav(d){
  var n=P[cP].imgs.length;cI=(cI+d+n)%n;showImg();
}
function closeM(){
  document.getElementById("modal").classList.remove("open");
  document.removeEventListener("keydown",onKey);
}
function onKey(e){
  if(e.key==="Escape")closeM();
  else if(e.key==="ArrowLeft")nav(-1);
  else if(e.key==="ArrowRight")nav(1);
}

/* swipe modal */
var _tx=0,_ty=0,_mod=document.getElementById("modal");
_mod.addEventListener("touchstart",function(e){_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
_mod.addEventListener("touchend",function(e){
  var dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5&&P[cP].imgs.length>1)nav(dx<0?1:-1);
  else if(dy>80&&Math.abs(dy)>Math.abs(dx)*1.5)closeM();
},{passive:true});
document.getElementById("mstage").addEventListener("click",function(e){
  if(e.target.id==="mstage")closeM();
});

/* ====== VIDEO MODAL ====== */
function openV(c){
  var box=document.getElementById("vbox");
  var pad=(c.o==="H")?56.25:150;
  box.style.paddingBottom=pad+"%";box.style.height="0";
  box.innerHTML='<iframe src="https://player.vimeo.com/video/'+c.id+'?autoplay=1&title=0&byline=0&portrait=0" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen style="position:absolute;inset:0"></iframe>';
  document.getElementById("vtitle").textContent=c.t;
  document.getElementById("vmodal").classList.add("open");
  document.addEventListener("keydown",onVKey);
}
function closeV(){
  document.getElementById("vmodal").classList.remove("open");
  document.getElementById("vbox").innerHTML="";
  document.removeEventListener("keydown",onVKey);
}
function onVKey(e){if(e.key==="Escape")closeV();}
document.getElementById("vframe").addEventListener("click",function(e){
  if(e.target.id==="vframe")closeV();
});

/* ====== RESIZE ====== */
var _rt,_lastN=colCount();
window.addEventListener("resize",function(){
  clearTimeout(_rt);_rt=setTimeout(function(){
    var n=colCount();
    if(n!==_lastN){_lastN=n;if(VIEW!=="about")render();}
  },160);
});

</script>
