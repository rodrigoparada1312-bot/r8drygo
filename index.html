<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--fg:#111111;--line:#e6e6e6;
  --side:260px;--gap:10px;
}
html,body{background:var(--bg);color:var(--fg);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:13px;line-height:1.45}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
body{display:flex;min-height:100vh}

/* ---------- SIDEBAR ---------- */
#side{position:fixed;top:0;left:0;width:var(--side);height:100vh;
  padding:26px 22px 22px;display:flex;flex-direction:column;
  border-right:1px solid var(--line);background:var(--bg);z-index:40}
#brand{display:flex;flex-direction:column;gap:12px;flex:0 0 auto}
#brand img{width:158px;height:auto}
.tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg)}
#views{margin-top:24px;display:flex;flex-direction:column;gap:4px;flex:0 0 auto}
.vbtn{font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--fg);cursor:pointer;background:none;border:0;text-align:left;
  padding:2px 0;font-family:inherit;transition:color .15s}
.vbtn:hover{color:#9a9a9a}
.vbtn.act{color:var(--fg);text-decoration:underline;text-underline-offset:3px}
.filters{margin-top:16px;display:flex;flex-direction:column;gap:3px;flex:0 0 auto}
.fbtn{font-size:11px;letter-spacing:.05em;color:var(--fg);cursor:pointer;
  background:none;border:0;text-align:left;padding:1px 0;font-family:inherit;
  text-transform:lowercase;transition:color .15s}
.fbtn:hover{color:#9a9a9a}
.fbtn.act{color:var(--fg);text-decoration:underline;text-underline-offset:3px}
#idxwrap{margin-top:18px;flex:1 1 auto;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;padding-bottom:54px}
#idxwrap::-webkit-scrollbar{width:5px}
#idxwrap::-webkit-scrollbar-thumb{background:var(--line)}
.ixItem{display:block;font-size:11.5px;line-height:1.55;color:var(--fg);
  cursor:pointer;text-transform:lowercase;padding:1px 0;transition:color .12s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ixItem:hover,.ixItem.hot{color:#9a9a9a}
#contact{position:fixed;bottom:0;left:0;width:var(--side);padding:14px 22px 18px;background:var(--bg);border-top:1px solid var(--line);z-index:41;
  display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--fg)}
#contact a{color:var(--fg);transition:color .15s}
#contact a:hover{color:#9a9a9a}

/* ---------- MAIN ---------- */
#main{margin-left:var(--side);flex:1 1 auto;padding:26px 22px 60px;min-width:0}
#topbar{display:flex;gap:20px;margin:0 0 18px;justify-content:flex-end}
#stage{display:flex;gap:var(--gap);align-items:flex-start}
.gcol{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:var(--gap)}
.cell{cursor:pointer;position:relative;background:#f4f4f4}
.cell img{width:100%;height:auto}
.cell .cap{position:absolute;left:0;right:0;bottom:0;padding:8px 8px 7px;
  font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#fff;
  background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,0));
  opacity:0;transition:opacity .18s}
.cell:hover .cap{opacity:1}
.cell.vid::after{content:"";position:absolute;top:50%;left:50%;
  width:0;height:0;transform:translate(-40%,-50%);
  border-left:16px solid rgba(255,255,255,.92);
  border-top:11px solid transparent;border-bottom:11px solid transparent;
  filter:drop-shadow(0 0 4px rgba(0,0,0,.4));pointer-events:none;opacity:.9}
.cell.vid .cap{opacity:1;background:linear-gradient(to top,rgba(0,0,0,.6),rgba(0,0,0,0))}
#empty{color:#999;font-size:12px;padding:40px 4px}

/* ---------- ABOUT ---------- */
#about{display:none;max-width:900px;padding:6px 4px}
#about.on{display:flex;gap:34px;flex-wrap:wrap;align-items:flex-start}
#about img{width:340px;max-width:100%;height:auto;background:#f4f4f4}
.about-txt{font-size:14px;line-height:1.7;max-width:340px}
.about-txt .sep{height:18px}
.about-txt a{text-decoration:underline;text-underline-offset:2px}

/* ---------- MODAL (project lightbox) ---------- */
#modal{position:fixed;inset:0;background:rgba(255,255,255,.985);z-index:80;
  display:none;flex-direction:column}
#modal.open{display:flex}
#mtop{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--fg)}
#mcount{opacity:.5}
#mclose{cursor:pointer;font-size:20px;line-height:1;color:var(--fg);background:none;border:0;padding:0 4px}
#mstage{flex:1 1 auto;position:relative;display:flex;align-items:center;justify-content:center;
  padding:0 20px 20px;min-height:0}
#mimg{max-width:100%;max-height:100%;object-fit:contain}
.marrow{position:absolute;top:0;bottom:0;width:34%;cursor:pointer;background:none;border:0;
  display:flex;align-items:center;z-index:2}
#mprev{left:0;justify-content:flex-start;padding-left:14px}
#mnext{right:0;justify-content:flex-end;padding-right:14px}
.marrow span{font-size:26px;color:var(--fg);opacity:0;transition:opacity .15s}
.marrow:hover span{opacity:.6}

/* ---------- VIDEO MODAL ---------- */
#vmodal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:90;display:none;
  flex-direction:column}
#vmodal.open{display:flex}
#vtop{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:#fff}
#vclose{cursor:pointer;font-size:20px;line-height:1;color:#fff;background:none;border:0}
#vframe{flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:0 20px 24px}
#vframe .box{position:relative;width:100%;max-width:1100px}
#vframe iframe{width:100%;height:100%;border:0;background:#000}

/* ---------- RESPONSIVE ---------- */
@media(max-width:820px){
  body{flex-direction:column}
  #side{position:sticky;top:0;width:100%;height:auto;flex-direction:row;flex-wrap:wrap;
    align-items:center;gap:14px;padding:12px 16px;border-right:0;border-bottom:1px solid var(--line)}
  #brand{flex-direction:row;align-items:center;gap:12px}
  #brand img{width:96px}
  .tag{display:none}
  #views{flex-direction:row;margin-top:0;gap:14px}
  .filters{flex-direction:row;margin-top:0;gap:12px;margin-left:auto}
  #idxwrap{display:none}
  #contact{position:static;flex-direction:row;justify-content:center;gap:18px;border-top:1px solid var(--line);padding:18px 16px;margin:0;width:100%;
    font-size:11px}
  #main{margin-left:0;padding:16px}
  #about.on{gap:20px}
  #about img{width:100%}
}
</style>

/* ====== DATA: leer proyectos desde / (index.html en vivo) ====== */
function full(pair){return "img/"+pair.split(":")[0]+".jpg";}
function small(pair){var u=pair.split(":")[0];return S[u]?"img/"+u+"_600.jpg":"img/"+u+".jpg";}
function cover(p){
  if(p.cov){var u=p.cov.split(":")[0];return S[u]?"img/"+u+"_600.jpg":"img/"+u+".jpg";}
  return small(p.imgs[0]);

async function load(){
  try{
    var r=await fetch("/",{cache:"no-store"});
    var t=await r.text();
    var mp=t.match(/var\s+P\s*=\s*(\[[\s\S]*?\])\s*;/);
    var ms=t.match(/var\s+S\s*=\s*(\{[\s\S]*?\})\s*;/);
    if(!mp) throw new Error("no P");
    P=JSON.parse(mp[1]).filter(function(p){return p.imgs&&p.imgs.length;});
    S=ms?JSON.parse(ms[1]):{};
    document.getElementById("empty").style.display="none";
    buildIndex();render();
  }catch(e){
    document.getElementById("empty").style.display="block";
    document.getElementById("empty").textContent="no se pudieron cargar los proyectos.";
  }
}

  window.scrollTo(0,0);render();
}
function setCat(c,btn){
  aF=c;
  document.querySelectorAll(".fbtn").forEach(function(b){b.classList.remove("act");});
  btn.classList.add("act");
  if(VIEW!=="index")setView("index");else render();
}

/* ====== PROJECT MODAL ====== */
function openM(pi){
  cP=pi;cI=0;
  document.getElementById("modal").classList.add("open");
  document.addEventListener("keydown",onKey);
  P[pi].imgs.slice(0,3).forEach(function(x){var i=new Image();i.src=full(x);});
  showImg();
}
function showImg(){
  var p=P[cP],imgs=p.imgs;
  var el=document.getElementById("mimg");
  var sm=small(imgs[cI]),fu=full(imgs[cI]);
  if(sm!==fu){el.src=sm;var b=new Image();(function(pp,ii){b.onload=function(){if(cP===pp&&cI===ii)el.src=fu;};})(cP,cI);b.src=fu;}
  else el.src=fu;
  var nx=imgs[(cI+1)%imgs.length];(new Image()).src=full(nx);
  document.getElementById("mtitle").textContent=p.t;
  document.getElementById("mcount").textContent=(cI+1)+" / "+imgs.length;
  var show=imgs.length>1?"flex":"none";
  document.getElementById("mprev").style.display=show;
  document.getElementById("mnext").style.display=show;
}
function nav(d){
  var n=P[cP].imgs.length;cI=(cI+d+n)%n;showImg();
}
function closeM(){
  document.getElementById("modal").classList.remove("open");
  document.removeEventListener("keydown",onKey);
}
function onKey(e){
  if(e.key==="Escape")closeM();
  else if(e.key==="ArrowLeft")nav(-1);
  else if(e.key==="ArrowRight")nav(1);
}

/* swipe modal */
var _tx=0,_ty=0,_mod=document.getElementById("modal");
_mod.addEventListener("touchstart",function(e){_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
_mod.addEventListener("touchend",function(e){
  var dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5&&P[cP].imgs.length>1)nav(dx<0?1:-1);
  else if(dy>80&&Math.abs(dy)>Math.abs(dx)*1.5)closeM();
},{passive:true});
document.getElementById("mstage").addEventListener("click",function(e){
  if(e.target.id==="mstage")closeM();
});

/* ====== VIDEO MODAL ====== */
function openV(c){
  var box=document.getElementById("vbox");
  var pad=(c.o==="H")?56.25:150;
  box.style.paddingBottom=pad+"%";box.style.height="0";
  box.innerHTML='<iframe src="https://player.vimeo.com/video/'+c.id+'?autoplay=1&title=0&byline=0&portrait=0" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen style="position:absolute;inset:0"></iframe>';
  document.getElementById("vtitle").textContent=c.t;
  document.getElementById("vmodal").classList.add("open");
  document.addEventListener("keydown",onVKey);
}
function closeV(){
  document.getElementById("vmodal").classList.remove("open");
  document.getElementById("vbox").innerHTML="";
  document.removeEventListener("keydown",onVKey);
}
function onVKey(e){if(e.key==="Escape")closeV();}
document.getElementById("vframe").addEventListener("click",function(e){
  if(e.target.id==="vframe")closeV();
});

/* ====== RESIZE ====== */
var _rt,_lastN=colCount();
window.addEventListener("resize",function(){
  clearTimeout(_rt);_rt=setTimeout(function(){
    var n=colCount();
    if(n!==_lastN){_lastN=n;if(VIEW!=="about")render();}
  },160);
});

load();
